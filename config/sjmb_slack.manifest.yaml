_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: sjmb-slack
  description: Socket Mode bot that stores URLs mentioned in invited Slack channels.
  background_color: "#1f6f5f"

features:
  bot_user:
    display_name: sjmbot
    always_online: false

oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - users:read

settings:
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_hosted: false
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
